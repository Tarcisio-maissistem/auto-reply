<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 40px;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .title {
      padding-left: 72px; /* offset da sidebar */
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 0.3px;
    }
    .title svg { opacity: 0.6; }
    .controls {
      display: flex;
      height: 40px;
      padding-right: 4px;
      align-items: center;
      -webkit-app-region: no-drag;
    }
    .btn {
      width: 46px;
      height: 40px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .btn.close:hover { background: #c42b1c; color: #fff; }
  </style>
</head>
<body>
  <div class="title">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="#ff7b00">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
    </svg>
    Ana Food
  </div>

  <div class="controls">
    <button class="btn" id="btn-min" title="Minimizar">
      <svg width="10" height="1" viewBox="0 0 10 1" fill="currentColor"><rect width="10" height="1"/></svg>
    </button>
    <button class="btn" id="btn-max" title="Maximizar">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="9" height="9"/></svg>
    </button>
    <button class="btn close" id="btn-close" title="Fechar">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
        <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
        <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('btn-min').onclick   = () => ipcRenderer.send('minimize');
    document.getElementById('btn-max').onclick   = () => ipcRenderer.send('maximize');
    document.getElementById('btn-close').onclick = () => ipcRenderer.send('close');
  </script>
</body>
</html>
